<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Code - Plataforma de Desarrollo Cooperativo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">

    <style>
        /* Evitamos poner el hidden al body global para no romper el scroll del resto de la app, 
           así que se lo aplicamos directamente al contenedor de la landing */
        #landing-view {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            margin: 0;
            padding: 0;
        }

        .fondo-3d {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1; /* Fondo del landing, pero detrás del botón */
        }

        spline-viewer {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>

   <div id="landing-view">
        
        <div class="fondo-3d">
           <iframe src='https://my.spline.design/reededliquidglassprismherosectionconcept-gT1YBuTtCNa3LGg0vqxjD9mv/' frameborder='0' width='100%' height='100%'></iframe>

       <button onclick="mostrarLogin()" 
        style="position: absolute; top: 58%; left: 35%; transform: translateX(-50%); z-index: 10; padding: 14px 32px; background-color: var(--verde-codigo, #10b981); color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 1.1rem; cursor: pointer; font-family: 'Open Sans', sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: all 0.2s ease;">
    Iniciar sesión
</button>
    </div>
    </div>

    <div id="login-view" style="display: none; width: 100vw; height: 100vh; align-items: center; justify-content: center; background-color: var(--fondo-app);">
        <div id="login-form" class="login-card">
            <div class="brand-container" style="display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 2rem;">
                <div class="logo-icon">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:60px; height:60px;">
                        <polygon points="50,5 93.3,30 93.3,70 50,95" fill="var(--verde-codigo)" />
                        <polygon points="50,5 6.7,30 6.7,70 50,95" fill="var(--azul-claridad)" />
                        <circle cx="50" cy="50" r="15" stroke="white" stroke-width="4" fill="none"/>
                        <path d="M50 35 L50 15 M50 65 L50 85 M35 50 L15 50 M65 50 L85 50" stroke="white" stroke-width="4" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="brand-text" style="display: flex; flex-direction: column; align-items: flex-start;">
                    <h1 class="brand-title" style="font-family: 'Open Sans', sans-serif; font-size: 2rem; color: var(--azul-claridad); margin: 0; font-weight: 700; line-height: 1.1; text-transform: uppercase;">CLEAR CODE</h1>
                    <p class="brand-slogan" style="font-size: 0.75rem; color: var(--gris-servicio); font-weight: 600; letter-spacing: 0.5px; margin: 0; margin-top: 2px; text-transform: uppercase;">SOLUCIONES TECNOLÓGICAS INNOVADORAS</p>
                </div>
            </div>

            <div class="form-group">
                <input type="text" id="username-input" class="login-input" placeholder="Nombre de usuario o Email">
            </div>
            <div class="form-group">
                <input type="password" id="password-input" class="login-input" placeholder="Contraseña">
            </div>

            <button class="btn-login" onclick="app.authController.login()">Acceder</button>

            <div class="forgot-password">
                <a href="#">¿Olvidó su contraseña?</a>
            </div>

            <div class="login-footer">
                <span>Español - Internacional (es)</span>
                <span>Aviso de Cookies</span>
            </div>
        </div>
    </div>

    <div id="app" class="hidden">
        <aside class="sidebar">
            <div class="sidebar-header" style="flex-direction: column; align-items: flex-start; padding: 1.5rem 1rem;">
                <div class="brand-container" style="display: flex; align-items: center; gap: 0.75rem;">
                    <div class="logo-icon">
                        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:36px; height:36px;">
                            <polygon points="50,5 93.3,30 93.3,70 50,95" fill="var(--verde-codigo)" />
                            <polygon points="50,5 6.7,30 6.7,70 50,95" fill="#ffffff" />
                            <circle cx="50" cy="50" r="15" stroke="white" stroke-width="4" fill="none"/>
                            <path d="M50 35 L50 15 M50 65 L50 85 M35 50 L15 50 M65 50 L85 50" stroke="white" stroke-width="4" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div class="brand-text" style="display: flex; flex-direction: column; align-items: flex-start;">
                        <span class="brand-title" style="font-family: 'Inter', sans-serif; font-size: 1.1rem; color: #ffffff; margin: 0; font-weight: 700; line-height: 1.1; text-transform: uppercase;">CLEAR CODE</span>
                        <span class="brand-slogan" style="font-size: 0.55rem; color: #cbd5e1; font-weight: 600; letter-spacing: 0.5px; margin: 0; margin-top: 2px; text-transform: uppercase;">SOLUCIONES TECNOLÓGICAS INNOVADORAS</span>
                    </div>
                </div>
            </div>
            <nav class="sidebar-nav" id="main-nav">
                <div class="nav-item active" onclick="app.navigate('global-chat')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                    </svg>
                    Chat Global
                </div>
                <div class="nav-item" onclick="app.navigate('social-network')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 16v-4" />
                        <path d="M12 8h.01" />
                        <path d="M18 12c0 3.314-2.686 6-6 6S6 15.314 6 12s2.686-6 6-6 6 2.686 6 6z" />
                        <path d="M8 12c0-2.21 1.79-4 4-4s4 1.79 4 4-1.79 4-4 4-4-1.79-4-4z" />
                    </svg>
                    Red Social Corporativa
                </div>
                <div class="nav-item" onclick="app.navigate('forum-list')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                    </svg>
                    Foro
                </div>
                <div class="nav-item" onclick="app.navigate('recursos')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    </svg>
                    Drive Compartido
                </div>
                <div class="nav-item" onclick="app.navigate('wiki')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    </svg>
                    Wiki Interna
                </div>
                <div class="nav-item" onclick="app.navigate('bookmarks')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                    </svg>
                    Marcadores
                </div>
                <div class="nav-item" onclick="app.navigate('admin-dashboard')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                    </svg>
                    Directorio
                </div>
            </nav>
            <div class="user-profile">
                <div class="user-info-clickable" onclick="app.navigate('edit-profile')" title="Editar Perfil">
                    <div class="avatar" id="user-avatar">A</div>
                    <div style="flex:1">
                        <div style="font-weight:600; font-size:0.9rem;" id="user-name">Admin User</div>
                        <div style="font-size:0.75rem; opacity:0.7;" id="user-role">Administrador</div>
                    </div>
                </div>
                <div class="logout-btn" style="cursor:pointer" onclick="app.logout()" title="Cerrar sesión">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h2 id="page-title">Dashboard</h2>
                <div id="header-actions"></div>
            </header>

            <div id="content-area" class="view-content">
                </div>
        </main>
    </div>

    <div id="modal-container"></div>

    <script>
        function mostrarLogin() {
            // Esconde la escena 3D
            document.getElementById('landing-view').style.display = 'none';
            // Muestra el login. Le pongo flex para que se mantenga centrado en la pantalla
            document.getElementById('login-view').style.display = 'flex';
        }
    </script>

    <script type="module" src="js/app.js"></script>
</body>

</html>
